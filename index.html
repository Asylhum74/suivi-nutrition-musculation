<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Suivi nutritif & musculaire 3D</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* ===== PRINCIPALE ===== */
body {margin: 0; font-family: 'Inter', system-ui, sans-serif; background: #f3f4f6; color: #111827; }
.app {display: flex; height: 100vh; }
.nav {background: white; padding: 15px; display: flex; gap: 10px; border-bottom: 1px solid #ddd; }

/* ===== SIDEBAR ===== */
.sidebar {width: 240px; background: #111827; color: white; padding: 30px 20px; display: flex; flex-direction: column; gap: 15px; }
.sidebar h2 {margin-bottom: 30px; }

/* ===== CONTENT ===== */
.content {flex: 1; padding: 40px; overflow-y: auto; }
.page {display: none;}
.page.active {display: block; }

/* ===== BOUTON NAV ===== */
.nav-btn {background: transparent; border: none; color: #9ca3af; padding: 12px; text-align: left; border-radius: 8px; cursor: pointer; transition: 0.2s; }
.nav-btn:hover {background: #1f2937; color: white; }
.nav-btn.active {background: #2563eb; color: white; }

/* ===== BOUTONS ===== */
button {font-family: inherit; }
.primary {background: #2563eb; color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
.primary:hover {background: #1d4ed8; transform: translateY(-1px); }
.secondary {background: #e5e7eb; border: none; padding: 8px 14px; border-radius: 8px; cursor: pointer; min-width: 150px; }
.secondary:hover {background: #d1d5db;}

/* ===== ELEMENTS ===== */
h1 {margin-top: 0; margin-bottom: 25px; font-size: 28px;}
.card {background: white; padding: 20px; border-radius: 14px; margin-bottom: 20px; box-shadow: 0 6px 20px rgba(0,0,0,0.05); transition: 0.2s; }
.card:hover {transform: translateY(-3px); }
input, select {padding: 8px; border-radius: 6px; border: 1px solid #ccc; }

/* ===== POPUP ===== */
.modal {position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none;
  transition: opacity 0.2s ease; }
.modal.active {opacity: 1; pointer-events: all; }
.modal-content {background: white; padding: 25px; border-radius: 12px; width: 320px; display: flex; flex-direction: column; gap: 10px; transform: scale(0.9);
  transition: transform 0.2s ease; }
.modal.active .modal-content {transform: scale(1); }
.modal-content input,
.modal-content select {padding: 8px; border-radius: 6px; border: 1px solid #ccc; }
.modal-buttons {display: flex; justify-content: space-between; margin-top: 10px; }

/* ===== TABLEAU DE BORD ===== */
.dashboard-grid {
  display: grid;
  grid-template-rows: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

/* ===== PROGRAMME ===== */
.program-card {position: relative; overflow: hidden; }
.program-header {display: flex; justify-content: space-between; align-items: center;}
.badge {background: #e0f2fe; color: #0369a1; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.exercise-item {display: flex; justify-content: space-between; align-items: center; background: #f9fafb; padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; }
.launch-btn { margin-top: 12px; width: 100%; font-weight: 600;  }

</style>
</head>
  
<body>
<div class="app">
  <aside class="sidebar">
    <h2>💪 FitTrack</h2>

    <button onclick="showPage('home')" class="nav-btn active">
      Tableau de bord
    </button>

    <button onclick="showPage('exercises')" class="nav-btn">
      Exercices
    </button>

    <button onclick="showPage('programs')" class="nav-btn">
      Programmes
    </button>
  </aside>

  <main class="content">

    <!-- PAGE ACCUEIL -->
    <section id="home" class="page active">

      <h1>Tableau de bord</h1>

      <div class="dashboard-grid">

        <div class="card" style="display: flex; flex-direction: column; gap:5px;">
          <h3>Profil</h3>
          <label>Âge :</label>
          <input type="number" id="ageInput">

          <label>Taille (cm) :</label>
          <input type="number" id="heightInput">

          <label>Poids (kg) :</label>
          <input type="number" id="weightInput">
        
          <label>Objectif :</label>
          <select id="goalInput">
            <option>Prise de masse</option>
            <option>Sèche</option>
            <option>Perte de poids</option>
          </select>

          <label>Objectif de séances / mois :</label>
          <input type="number" id="monthlyGoalInput">
        
          <p><button class="primary" onclick="saveProfile()">Enregistrer</button></p>
        </div>

        <div class="card" id="monthlySummary">
          <h2 id="monthlyCountText">0 séance ce mois-ci</h2>
          <p id="monthlyGoalText">Objectif : 0</p>
          <p id="goalStatus"></p>
        </div>
        <div class="card">
          <h3>Séances du mois</h3>
          <canvas id="monthlyCount"></canvas>
        </div>

        <div class="card">
          <h3>Dernier record</h3>
          <p id="lastPR">Aucun record</p>
        </div>

      </div>

    </section>

    <!-- PAGE EXERCICES -->
    <section id="exercises" class="page">
      <h1>Bibliothèque d'exercices</h1>
      <div id="exerciseList"></div>
    </section>

    <!-- PAGE PROGRAMMES -->
    <section id="programs" class="page">
      <h1>Programmes</h1>
      <p><button onclick="createProgram()" class="primary">➕ Créer un programme</button></p>
      <div id="programList"></div>
    </section>

  </main>
</div>

<script>
// ------------------- GESTION BOUTON NAVIGATION ----------------
const buttons = document.querySelectorAll(".nav-btn");

buttons.forEach(button => {
  button.addEventListener("click", () => {
    buttons.forEach(btn => btn.classList.remove("active"));
    button.classList.add("active");

  });
});
// ------------------- NAVIGATION ----------------
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(page => {
    page.classList.remove('active');
  });


  document.getElementById(pageId).classList.add('active');
}

// ------------------- DONNEES ----------------
let monthlyWorkouts = 0;
let workoutHistory = [];
let monthlyCount = 0;
let workoutChart = null;
let profile = {
  age: "",
  height: "",
  weight: "",
  goal: "",
  monthlyGoal: ""
};
let exercises = [
  { name: "Squat", muscle: "Jambes", category: "Polyarticulaire" },
  { name: "Développé couché", muscle: "Pectoraux", category: "Polyarticulaire" },
  { name: "Curl biceps", muscle: "Biceps", category: "Isolation" }
];
let programs = [];
  
// ------------------- SAUVEGARDE PROFILE ----------------
function loadProfile() {
  document.getElementById("ageInput").value = profile.age;
  document.getElementById("heightInput").value = profile.height;
  document.getElementById("weightInput").value = profile.weight;
  document.getElementById("goalInput").value = profile.goal;
  document.getElementById("monthlyGoalInput").value = profile.monthlyGoal;
}
function saveProfile() {
  profile.age = parseInt(document.getElementById("ageInput").value);
  profile.height = parseInt(document.getElementById("heightInput").value);
  profile.weight = parseInt(document.getElementById("weightInput").value);
  profile.goal = document.getElementById("goalInput").value;
  profile.monthlyGoal = parseInt(document.getElementById("monthlyGoalInput").value);

  saveData();
  updateMonthlySummary();
}

// ------------------- SAUVEGARDE DONNEES ----------------
function saveData() {
  localStorage.setItem("programs", JSON.stringify(programs));
  localStorage.setItem("monthlyWorkouts", monthlyWorkouts);
  localStorage.setItem("workoutHistory", JSON.stringify(workoutHistory));
  localStorage.setItem("profile", JSON.stringify(profile));
}

function loadData() {
  const savedPrograms = localStorage.getItem("programs");
  const savedWorkouts = localStorage.getItem("monthlyWorkouts");
  const savedHistory = localStorage.getItem("workoutHistory");
  const savedProfile = localStorage.getItem("profile");

  if (savedPrograms) programs = JSON.parse(savedPrograms);
  if (savedWorkouts) monthlyWorkouts = parseInt(savedWorkouts);
  if (savedHistory) workoutHistory = JSON.parse(savedHistory);
  if (savedProfile) profile = JSON.parse(savedProfile); 

  document.getElementById("monthlyCount").innerText = monthlyWorkouts;
}

// ===== AFFICHAGE EXERCICES =====
function renderExercises() {
  const list = document.getElementById("exerciseList");
  list.innerHTML = "";

  exercises.forEach(ex => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <h3>${ex.name}</h3>
      <p>Muscle : ${ex.muscle}</p>
      <p>Catégorie : ${ex.category}</p>
      <button class="secondary" onclick="openAddToProgram('${ex.name}')">
        Ajouter à un programme
      </button>
    `;
    list.appendChild(div);
  });
}

// ===== CREER PROGRAMME =====
function createProgram() {
  const name = prompt("Nom du programme :");
  if (!name) return;

  programs.push({
    name: name,
    exercises: []
  });

  renderPrograms();
}

// ===== AJOUTER EXERCICE A PROGRAMME =====
function openAddToProgram(exerciseName) {

  if (programs.length === 0) {
    alert("Crée d'abord un programme !");
    return;
  }

  selectedExercise = exerciseName;

  const select = document.getElementById("programSelect");
  select.innerHTML = "";

  programs.forEach(program => {
    const option = document.createElement("option");
    option.value = program.name;
    option.textContent = program.name;
    select.appendChild(option);
  });

  document.getElementById("exerciseModal").classList.add("active");
}
function confirmAddExercise() {

  const programName = document.getElementById("programSelect").value;
  const sets = parseInt(document.getElementById("setsInput").value);
  const reps = parseInt(document.getElementById("repsInput").value);

  if (!sets || sets < 1) {
    alert("Nombre de séries invalide");
    return;
  }

  if (!reps || reps < 1) {
    alert("Nombre de répétitions invalide");
    return;
  }

  const program = programs.find(p => p.name === programName);
  if (!program) return;

  program.exercises.push({
    name: selectedExercise,
    sets: sets,
    reps: reps
  });

  saveData();
  renderPrograms();
  closeModal();
}
function closeModal() {
  document.getElementById("exerciseModal").classList.remove("active");
}

// ===== AFFICHAGE PROGRAMMES =====
function renderPrograms() {
  const list = document.getElementById("programList");
  list.innerHTML = "";

  programs.forEach(program => {

    const div = document.createElement("div");
    div.className = "card program-card";

    let exercisesHTML = "";

    program.exercises.forEach((ex, index) => {
      exercisesHTML += `
        <div class="exercise-item">
          <span>${ex.name} — ${ex.sets}x${ex.reps}</span>
          <div>
            <button onclick="editExercise('${program.name}', ${index})">✏</button>
            <button onclick="deleteExercise('${program.name}', ${index})">🗑</button>
          </div>
        </div>
      `;
    });

    div.innerHTML = `
      <div class="program-header">
        <h3>${program.name}</h3>
        <span class="badge">${program.exercises.length} exo</span>
      </div>

      ${exercisesHTML || "<p>Aucun exercice</p>"}

      <button class="primary launch-btn"
        onclick="launchProgram('${program.name}')">
        ▶ Lancer la séance
      </button>
    `;

    list.appendChild(div);
  });
}
function deleteExercise(programName, index) {
  const program = programs.find(p => p.name === programName);
  if (!program) return;

  program.exercises.splice(index, 1);
  saveData();
  renderPrograms();
}
function editExercise(programName, index) {

  const program = programs.find(p => p.name === programName);
  if (!program) return;

  const ex = program.exercises[index];

  const newSets = parseInt(prompt("Nouvelles séries :", ex.sets));
  const newReps = parseInt(prompt("Nouvelles répétitions :", ex.reps));

  if (!newSets || !newReps) return;

  ex.sets = newSets;
  ex.reps = newReps;

  saveData();
  renderPrograms();
}

function getMonthlyCount() {
  const now = new Date();
  const currentMonth = now.getMonth();
  const currentYear = now.getFullYear();

  return workoutHistory.filter(date => {
    const d = new Date(date);
    return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
  }).length;
}
function updateMonthlySummary() {

  const count = getMonthlyCount();

  document.getElementById("monthlyCountText").innerText =
    count + " séance" + (count > 1 ? "s" : "") + " ce mois-ci";

  document.getElementById("monthlyGoalText").innerText =
    "Objectif : " + profile.monthlyGoal + " séances";

  const status = document.getElementById("goalStatus");

  if (count >= profile.monthlyGoal) {
    status.innerText = "✅ Objectif atteint ! Bravo !";
    status.style.color = "green";
  } else {
    const remaining = profile.monthlyGoal - count;
    status.innerText = "Il te reste " + remaining + " séance" +
      (remaining > 1 ? "s" : "") + " pour atteindre ton objectif !";
    status.style.color = "black";
  }
}

function renderChart() {

  const ctx = document.getElementById("monthlyCount").getContext("2d");

  if (monthlyCount) {
    monthlyCount.destroy();
  }

  const now = new Date();
  const currentMonth = now.getMonth();
  const currentYear = now.getFullYear();

  // Tableau 4 semaines (modifiable si tu veux 5)
  let weeklyCount = [0, 0, 0, 0, 0];

  workoutHistory.forEach(date => {
    const d = new Date(date);

    if (
      d.getMonth() === currentMonth &&
      d.getFullYear() === currentYear
    ) {
      const weekNumber = Math.floor((d.getDate() - 1) / 7);
      weeklyCount[weekNumber]++;
    }
  });

  monthlyCount = new Chart(ctx, {
    type: "line", // change en "bar" si tu préfères
    data: {
      labels: ["Sem 1", "Sem 2", "Sem 3", "Sem 4", "Sem 5"],
      datasets: [{
        label: "Séances par semaine",
        data: weeklyCount,
        tension: 0.3
      }]
    }
  });
}

// ===== LANCER PROGRAMME =====
function launchProgram(programName) {

  workoutHistory.push(new Date());

  saveData();

  document.getElementById("monthlyCount").innerText = monthlyWorkouts;

 saveData(); 
 updateMonthlySummary();
 renderChart();
}
// Initialisation
loadData();
loadProfile();
renderExercises();
renderPrograms();
updateMonthlySummary();
renderChart();
</script>
<!-- MODALE AJOUT EXERCICE -->
<div id="exerciseModal" class="modal">
  <div class="modal-content">
    <h3>Ajouter à un programme</h3>

    <label>Programme :</label>
    <select id="programSelect"></select>

    <label>Séries :</label>
    <input type="number" id="setsInput" min="1" value="3">

    <label>Répétitions :</label>
    <input type="number" id="repsInput" min="1" value="10">

    <div class="modal-buttons">
      <button onclick="confirmAddExercise()" class="primary">Ajouter</button>
      <button onclick="closeModal()" class="secondary">Annuler</button>
    </div>
  </div>
</div>
</body>
</html>
