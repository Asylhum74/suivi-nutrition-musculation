<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Suivi nutritif & musculaire 3D</title>
<style>
body {
  margin: 0;
  font-family: 'Inter', system-ui, sans-serif;
  background: #f3f4f6;
  color: #111827;
}

.app {
  display: flex;
  height: 100vh;
}

.nav {
  background: white;
  padding: 15px;
  display: flex;
  gap: 10px;
  border-bottom: 1px solid #ddd;
}
/* ===== SIDEBAR ===== */

.sidebar {
  width: 240px;
  background: #111827;
  color: white;
  padding: 30px 20px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.sidebar h2 {
  margin-bottom: 30px;
}

.nav-btn {
  background: transparent;
  border: none;
  color: #9ca3af;
  padding: 12px;
  text-align: left;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.nav-btn:hover {
  background: #1f2937;
  color: white;
}

.nav-btn.active {
  background: #2563eb;
  color: white;
}
.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

/* ===== CONTENT ===== */
.content {
  flex: 1;
  padding: 40px;
  overflow-y: auto;
}
/* ===== TITRES ===== */
h1 {
  margin-top: 0;
  margin-bottom: 25px;
  font-size: 28px;
}
/* ===== CARDS ===== */
.card {
  background: white;
  padding: 20px;
  border-radius: 14px;
  margin-bottom: 20px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.05);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-3px);
}
/* ===== BOUTONS ===== */
button {
  font-family: inherit;
}

.primary {
  background: #2563eb;
  color: white;
  border: none;
  padding: 10px 18px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.primary:hover {
  background: #1d4ed8;
  transform: translateY(-1px);
}

.secondary {
  background: #e5e7eb;
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
}

.secondary:hover {
  background: #d1d5db;
}
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
}

.modal.active {
  opacity: 1;
  pointer-events: all;
}

.modal-content {
  background: white;
  padding: 25px;
  border-radius: 12px;
  width: 320px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transform: scale(0.9);
  transition: transform 0.2s ease;
}
.modal.active .modal-content {
  transform: scale(1);
}

.modal-content input,
.modal-content select {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.modal-buttons {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.secondary {
  background: #e5e7eb;
}
</style>
</head>
  
<body>
<div class="app">
  <aside class="sidebar">
    <h2>💪 FitTrack</h2>

    <button onclick="showPage('home')" class="nav-btn active">
      Tableau de bord
    </button>

    <button onclick="showPage('exercises')" class="nav-btn">
      Exercices
    </button>

    <button onclick="showPage('programs')" class="nav-btn">
      Programmes
    </button>
  </aside>

  <main>

    <!-- PAGE ACCUEIL -->
    <section id="home" class="page active">

      <h1>Tableau de bord</h1>

      <div class="dashboard-grid">

        <div class="card">
          <h3>Profil</h3>
          <p><strong>Âge :</strong> 22 ans</p>
          <p><strong>Poids :</strong> 72 kg</p>
          <p><strong>Taille :</strong> 180 cm</p>
          <p><strong>Objectif :</strong> Prise de masse</p>
        </div>

        <div class="card">
          <h3>Séances ce mois</h3>
          <p style="font-size: 28px; font-weight: bold;" id="monthlyCount">0</p>
        </div>

        <div class="card">
          <h3>Dernier record</h3>
          <p id="lastPR">Aucun record</p>
        </div>

      </div>

    </section>

    <!-- PAGE EXERCICES -->
    <section id="exercises" class="page" style="display:none;">
      <h1>Bibliothèque d'exercices</h1>
      <div id="exerciseList"></div>
    </section>

    <!-- PAGE PROGRAMMES -->
    <section id="programs" class="page" style="display:none;">
      <h1>Programmes</h1>
      <button onclick="createProgram()" class="primary">➕ Créer un programme</button>
      <div id="programList"></div>
    </section>

  </main>
</div>

<script>
// Navigation
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(page => {
  //document.querySelectorAll(".page").forEach(p => p.style.display = "none");
  //document.getElementById(pageId).style.display = "block";
    page.classList.remove('active');
  });


  document.getElementById(pageId).classList.add('active');
}

// ===== Données =====
let monthlyWorkouts = 0;

let exercises = [
  { name: "Squat", muscle: "Jambes", category: "Polyarticulaire" },
  { name: "Développé couché", muscle: "Pectoraux", category: "Polyarticulaire" },
  { name: "Curl biceps", muscle: "Biceps", category: "Isolation" }
];

let programs = [];

function saveData() {
  localStorage.setItem("programs", JSON.stringify(programs));
  localStorage.setItem("monthlyWorkouts", monthlyWorkouts);
}

function loadData() {
  const savedPrograms = localStorage.getItem("programs");
  const savedWorkouts = localStorage.getItem("monthlyWorkouts");

  if (savedPrograms) programs = JSON.parse(savedPrograms);
  if (savedWorkouts) monthlyWorkouts = parseInt(savedWorkouts);

  document.getElementById("monthlyCount").innerText = monthlyWorkouts;
}

// ===== AFFICHAGE EXERCICES =====
function renderExercises() {
  const list = document.getElementById("exerciseList");
  list.innerHTML = "";

  exercises.forEach(ex => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <h3>${ex.name}</h3>
      <p>Muscle : ${ex.muscle}</p>
      <p>Catégorie : ${ex.category}</p>
      <button onclick="openAddToProgram('${ex.name}')">
        Ajouter à un programme
      </button>
    `;
    list.appendChild(div);
  });
}

// ===== CREER PROGRAMME =====
function createProgram() {
  const name = prompt("Nom du programme :");
  if (!name) return;

  programs.push({
    name: name,
    exercises: []
  });

  renderPrograms();
}

// ===== AJOUTER EXERCICE A PROGRAMME =====
function openAddToProgram(exerciseName) {

  if (programs.length === 0) {
    alert("Crée d'abord un programme !");
    return;
  }

  selectedExercise = exerciseName;

  const select = document.getElementById("programSelect");
  select.innerHTML = "";

  programs.forEach(program => {
    const option = document.createElement("option");
    option.value = program.name;
    option.textContent = program.name;
    select.appendChild(option);
  });

  document.getElementById("exerciseModal").classList.add("active");
}
function confirmAddExercise() {

  const programName = document.getElementById("programSelect").value;
  const sets = parseInt(document.getElementById("setsInput").value);
  const reps = parseInt(document.getElementById("repsInput").value);

  if (!sets || sets < 1) {
    alert("Nombre de séries invalide");
    return;
  }

  if (!reps || reps < 1) {
    alert("Nombre de répétitions invalide");
    return;
  }

  const program = programs.find(p => p.name === programName);
  if (!program) return;

  program.exercises.push({
    name: selectedExercise,
    sets: sets,
    reps: reps
  });

  saveData();
  renderPrograms();
  closeModal();
}
function closeModal() {
  document.getElementById("exerciseModal").classList.remove("active");
}

// ===== AFFICHAGE PROGRAMMES =====
function renderPrograms() {
  const list = document.getElementById("programList");
  list.innerHTML = "";

  programs.forEach(program => {

    const div = document.createElement("div");
    div.className = "card";

    let exercisesHTML = "";

    program.exercises.forEach((ex, index) => {
      exercisesHTML += `
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span>${ex.name} — ${ex.sets}x${ex.reps}</span>
          <div>
            <button onclick="editExercise('${program.name}', ${index})">✏</button>
            <button onclick="deleteExercise('${program.name}', ${index})">🗑</button>
          </div>
        </div>
      `;
    });

    div.innerHTML = `
      <h3>${program.name}</h3>
      ${exercisesHTML || "<p>Aucun exercice</p>"}
      <button onclick="launchProgram('${program.name}')">
        ▶ Lancer
      </button>
    `;

    list.appendChild(div);
  });
}
function deleteExercise(programName, index) {
  const program = programs.find(p => p.name === programName);
  if (!program) return;

  program.exercises.splice(index, 1);
  saveData();
  renderPrograms();
}
function editExercise(programName, index) {

  const program = programs.find(p => p.name === programName);
  if (!program) return;

  const ex = program.exercises[index];

  const newSets = parseInt(prompt("Nouvelles séries :", ex.sets));
  const newReps = parseInt(prompt("Nouvelles répétitions :", ex.reps));

  if (!newSets || !newReps) return;

  ex.sets = newSets;
  ex.reps = newReps;

  saveData();
  renderPrograms();
}

// ===== LANCER PROGRAMME =====
function launchProgram(programName) {

  const program = programs.find(p => p.name === programName);
  if (!program) return;

  alert("Séance terminée !");

  monthlyWorkouts++;
  saveData();
  document.getElementById("monthlyCount").innerText = monthlyWorkouts;
}

// Initialisation
loadData();
renderExercises();
renderPrograms();
</script>
<!-- MODALE AJOUT EXERCICE -->
<div id="exerciseModal" class="modal">
  <div class="modal-content">
    <h3>Ajouter à un programme</h3>

    <label>Programme :</label>
    <select id="programSelect"></select>

    <label>Séries :</label>
    <input type="number" id="setsInput" min="1" value="3">

    <label>Répétitions :</label>
    <input type="number" id="repsInput" min="1" value="10">

    <div class="modal-buttons">
      <button onclick="confirmAddExercise()">Ajouter</button>
      <button onclick="closeModal()" class="secondary">Annuler</button>
    </div>
  </div>
</div>
</body>
</html>
