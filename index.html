<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Suivi nutritif & musculaire 3D</title>
<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #f4f6f9;
}

.nav {
  background: white;
  padding: 15px;
  display: flex;
  gap: 10px;
  border-bottom: 1px solid #ddd;
}

.nav button {
  padding: 8px 15px;
  border: none;
  background: #e5e7eb;
  cursor: pointer;
  border-radius: 6px;
}

.page {
  display: none;
  padding: 20px;
}

.page.active {
  display: block;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.05);
}

.primary {
  background: #2563eb;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>
  
<body>
<nav class="nav">
  <button onclick="showPage('home')">Accueil</button>
  <button onclick="showPage('exercises')">Exercices</button>
  <button onclick="showPage('programs')">Programmes</button>
</nav>

<main>

  <!-- PAGE ACCUEIL -->
  <section id="home" class="page active">
    <h1>Tableau de bord</h1>

    <div class="card">
      <h3>Informations personnelles</h3>
      <p>Âge : <span id="age">22</span></p>
      <p>Taille : <span id="height">180</span> cm</p>
      <p>Poids : <span id="weight">72</span> kg</p>
      <p>Objectif : <span id="goal">Prise de masse</span></p>
    </div>

    <div class="card">
      <h3>Séances ce mois</h3>
      <p id="monthlyCount">0</p>
    </div>

    <div class="card">
      <h3>Dernier record</h3>
      <p id="lastPR">Aucun record pour le moment</p>
    </div>

    <button onclick="showPage('programs')" class="primary">
      ➕ Lancer une séance
    </button>
  </section>

  <!-- PAGE EXERCICES -->
  <section id="exercises" class="page">
    <h1>Bibliothèque d'exercices</h1>
    <div id="exerciseList"></div>
  </section>

  <!-- PAGE PROGRAMMES -->
  <section id="programs" class="page">
    <h1>Programmes</h1>
    <div id="programList"></div>
  </section>

</main>

<script>
// Navigation
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(page => {
    page.classList.remove('active');
  });

  document.getElementById(pageId).classList.add('active');
}

// Données
let monthlyWorkouts = 0;
let records = {};
let programs = [];
let exercises = [
  { name: "Squat", muscle: "Jambes", category: "Polyarticulaire" },
  { name: "Développé couché", muscle: "Pectoraux", category: "Polyarticulaire" },
  { name: "Curl biceps", muscle: "Biceps", category: "Isolation" }
];

// Affichage exercices
function renderExercises() {
  const list = document.getElementById("exerciseList");
  list.innerHTML = "";

  exercises.forEach(ex => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <h3>${ex.name}</h3>
      <p>Muscle : ${ex.muscle}</p>
      <p>Catégorie : ${ex.category}</p>
      <button onclick="addToProgram('${ex.name}')">Ajouter à un programme</button>
    `;
    list.appendChild(div);
  });
}

function addToProgram(exerciseName) {
  alert("On ajoutera bientôt : " + exerciseName);
}

renderExercises();
</script>
</body>
</html>
